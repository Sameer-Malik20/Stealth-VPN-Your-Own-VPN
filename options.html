<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 600px; margin: 40px auto; font-family: 'Inter', Arial, sans-serif; background: #0f172a; color: white; }
    .card { background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    h2 { margin-top: 0; color: #6366f1; }
    textarea { width: 100%; height: 120px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 12px; font-family: monospace; }
    button { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:hover { background: #4f46e5; }
    .label { font-size: 14px; color: #94a3b8; margin-bottom: 8px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Stealth VPN V2 Settings</h2>
    
    <span class="label">Proxy List (format: type:host:port:user:pass)</span>
    <textarea id="proxyList"></textarea>

    <div style="margin-top:20px;">
        <span class="label">Domain Bypass List</span>
        <textarea id="domainList"></textarea>
    </div>

    <div style="margin-top:20px;">
        <button id="saveBtn">Save & Apply</button>
    </div>
  </div>
  <script src="functions.js"></script>
  <script src="options.js"></script>
</body>
</html>
